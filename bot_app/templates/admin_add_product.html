<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/iconcha.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/iconnn.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>Yangi Mahsulot Qo'shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Asosiy sahifa bilan bir xil fon uslubi */
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?q=80&w=2070&auto=format&fit=crop') fixed center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Shaffof admin karta */
        .admin-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1f2026;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 12px;
        }

        .btn-save { background-color: #ffc107; border: none; padding: 12px; }
        .btn-back { background-color: #6c757d; color: white; padding: 12px; }
    </style>
</head>
<body>

<div class="admin-card p-4">
    <h4 class="text-center fw-bold mb-4">➕ Yangi Shirinlik Qo'shish</h4>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold">Kategoriyasi:</label>
            <select name="category" class="form-select" required>
                <option value="">-- Kategoriya tanlang --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Mahsulot nomi:</label>
            <input type="text" name="name" class="form-control" placeholder="Masalan: Snickers Torti" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Narxi:</label>
            <input type="text" name="price" class="form-control" placeholder="Masalan: 120,000 so'm" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Mahsulot rasmi:</label>
            <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-save w-100 fw-bold">Saqlash</button>
            <a href="{% url 'custom_admin' %}" class="btn btn-back w-100 fw-bold">Orqaga</a>
        </div>
    </form>
</div>

</body>
</html>
