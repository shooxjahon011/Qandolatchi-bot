<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/iconcha.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/iconnn.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>Muvaffaqiyatli!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Asosiy sahifa bilan bir xil fon */
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?q=80&w=2070&auto=format&fit=crop') fixed center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Shaffof va zamonaviy karta */
        .success-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1f2026;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .btn-home {
            background-color: #e83e8c;
            color: #fff;
            border-radius: 15px;
            padding: 12px;
            font-weight: bold;
            border: none;
        }
        .btn-home:hover { background-color: #d63384; color: #fff; }
    </style>
</head>
<body>

<div class="success-card">
    <div class="display-1 mb-3">🎉</div>
    <h2 class="fw-bold mb-3">Buyurtma Qabul Qilindi!</h2>
    <p class="text-secondary fs-5">
        <strong>{{ product.name }}</strong> uchun so'rovingiz muvaffaqiyatli ro'yxatga olindi.
    </p>
    <p class="text-muted small">Tez orada operatorlarimiz siz bilan bog'lanishadi.</p>

    <hr class="my-4">

    <a href="{% url 'home' %}" class="btn btn-home w-100">🏠 Asosiy sahifaga qaytish</a>
</div>

</body>
</html>
