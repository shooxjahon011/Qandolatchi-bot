<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/iconcha.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/iconnn.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>Buyurtma rasmiylashtirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?q=80&w=2070&auto=format&fit=crop') fixed center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1f2026;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ccc; }
        .btn-order { background-color: #e83e8c; color: #fff; border: none; padding: 12px; font-weight: bold; }
        .btn-order:hover { background-color: #d63384; color: #fff; }
        .btn-cancel { background: transparent; border: 1px solid #6c757d; color: #6c757d; padding: 12px; }
    </style>
</head>
<body>

<div class="order-card p-4">
    <h4 class="text-center fw-bold mb-4">🛒 Buyurtma Berish</h4>
    <h6 class="text-center mb-4 text-secondary">Tanlangan: <span class="fw-bold text-dark">{{ product.name }}</span></h6>

    <form method="POST" id="orderForm">
        {% csrf_token %}

        <div class="row g-2 mb-2">
            <div class="col-6">
                <input type="text" name="client_name" class="form-control" placeholder="Ismingiz" required>
            </div>
            <div class="col-6">
                <input type="text" name="phone" class="form-control" placeholder="Telefon" required>
            </div>
        </div>

        <div class="row g-2 mb-2">
            <div class="col-6">
                <input type="text" name="order_amount" class="form-control" placeholder="Ulush" required>
            </div>
            <div class="col-6">
                <input type="text" id="mahalla" class="form-control" placeholder="Mahalla" required>
            </div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <input type="text" id="kocha" class="form-control" placeholder="Ko'cha" required>
            </div>
            <div class="col-6">
                <input type="text" id="uy" class="form-control" placeholder="Uy / Mo'ljal" required>
            </div>
        </div>

        <input type="hidden" name="location" id="final_location">
        <div class="text-danger small mb-3 fw-bold text-center">⚠️ Yetkazib berish: 10 000 so'm</div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-order w-100">Tasdiqlash</button>
            <a href="{% url 'home' %}" class="btn btn-cancel w-100">Bekor</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        const m = document.getElementById('mahalla').value;
        const k = document.getElementById('kocha').value;
        const u = document.getElementById('uy').value;
        document.getElementById('final_location').value = `Mahalla: ${m}, Ko'cha: ${k}, Uy: ${u}`;
    });
</script>

</body>
</html>
