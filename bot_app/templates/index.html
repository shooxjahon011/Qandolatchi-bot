<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/iconcha.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/iconnn.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>Norgul Qandolatchilik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Orqa fonni xiralashtirish uchun overlay */
        body {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url('https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?q=80&w=2070&auto=format&fit=crop') fixed center/cover;
            min-height: 100vh;
            color: #fff;
        }

        /* LOGO UCHUN YANGI USLUB */
        .brand-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* SHAFFOF VA KO'K TUSLI TUGMALAR */
        .category-btn {
            border-radius: 12px;
            padding: 10px 22px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0, 123, 255, 0.3);
            backdrop-filter: blur(10px);
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        .category-btn:hover { background: rgba(0, 123, 255, 0.6); border-color: rgba(255,255,255,0.6); }

        /* Kartalarni bir xil o'lchamda saqlash */
        .uzum-card { border-radius: 20px; background: rgba(255, 255, 255, 0.95); color: #1f2026; height: 100%; display: flex; flex-direction: column; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 15px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn-uzum-cart { background-color: #e83e8c; color: #fff; width: 100%; border-radius: 10px; border: none; }
        .btn-uzum-cart:hover { background-color: #d63384; color: #fff; }

        /* Buyurtmalarim tugmasi uslubi */
        .my-orders-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<a href="{% url 'my_orders' %}" class="my-orders-link">📦 Buyurtmalarim</a>

<div class="container py-5 text-center">
    <h1 class="brand-logo">Norgul</h1>

    <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
        <button id="adminTrigger" class="btn category-btn">Hammasi</button>
        {% for cat in categories %}
            <a href="?category={{ cat.id }}" class="btn category-btn">{{ cat.name }}</a>
        {% endfor %}
    </div>

    <div class="row row-cols-2 row-cols-md-4 g-3">
        {% for product in products %}
        <div class="col">
            <div class="uzum-card p-2">
                <div class="img-container">
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                </div>
                <div class="p-2 flex-grow-1 d-flex flex-column justify-content-between">
                    <div>
                        <div class="fw-bold">{{ product.name }}</div>
                        <div class="text-muted">{{ product.price }}</div>
                    </div>
                    <a href="{% url 'create_order' product.id %}" class="btn btn-uzum-cart mt-2">Sotib olish</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    let clickCount = 0;
    let firstClickTime = 0;

    document.getElementById('adminTrigger').addEventListener('click', function() {
        const currentTime = new Date().getTime();

        if (clickCount === 0 || (currentTime - firstClickTime) > 5000) {
            clickCount = 1;
            firstClickTime = currentTime;
        } else {
            clickCount++;
        }

        if (clickCount >= 3) {
            if ((currentTime - firstClickTime) <= 5000) {
                window.location.href = "{% url 'custom_admin' %}";
            } else {
                clickCount = 0;
            }
        }
    });
</script>

</body>
</html>
